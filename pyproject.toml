[tool.ruff]
target-version = "py311"
line-length = 120
src = ["server/app"]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "RUF",  # ruff-specific rules
]
ignore = [
  "E501",   # line length (handled by formatter)
  "RUF012", # mutable class attrs (we use simple class config)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]
