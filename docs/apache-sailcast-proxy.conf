# SailCast at /sailcast – proxy to uvicorn on port 8000.
# Copy to Apache vhosts and include from httpd.conf, or add inside your VirtualHost.
# Requires: mod_proxy, mod_proxy_http, mod_rewrite (a2enmod rewrite).

RewriteEngine On
RewriteRule ^/sailcast$ /sailcast/ [R=301,L]

ProxyPreserveHost On
ProxyPass /sailcast/ http://127.0.0.1:8000/
ProxyPassReverse /sailcast/ http://127.0.0.1:8000/
